<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM HUB PRO</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0f1f, #111827);
  color: white;
  padding-top: 65px;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111827;
  padding: 10px 0;
  border-bottom: 1px solid #333;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 11px;
  font-weight: bold;
}

/* PAGE */
.page { display:none; padding:20px; text-align:center; }
.active { display:block; }

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  margin-top:20px;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.back { background:#374151 !important; }
.emergency { background:#dc2626 !important; }

/* TIMER */
.timer {
  font-size:32px;
  font-weight:bold;
  margin:10px 0;
}

/* EX */
.ex {
  background:#1f2937 !important;
}
.ex.active {
  background:#22c55e !important;
}

/* CYCLING */
.cyclingBox {
  font-size:20px;
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

audio { width:100%; }
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="openPage('home')">HOME</button>
  <button onclick="openPage('workout')">WORKOUT</button>
  <button onclick="openPage('cycling')">CYCLING</button>
  <button onclick="openPage('music')">MUSIC</button>
  <button onclick="openPage('emergency')">EMERGENCY</button>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">
    <h1>🏋️ GYM HUB PRO</h1>
    <button onclick="openPage('workout')">💪 START WORKOUT</button>
    <button onclick="openPage('cycling')">🚴 CYCLING</button>
    <button onclick="openPage('music')">🎧 MUSIC</button>
  </div>
</div>

<!-- WORKOUT -->
<div class="page" id="workout">
  <div class="card">
    <h2>💪 POWER HIIT</h2>

    <div class="timer" id="timer">READY</div>

    <button onclick="startHIIT()">START</button>
    <button onclick="stopHIIT()">PAUSE</button>

    <div>
      <button class="ex" id="ex0">1 Bench</button>
      <button class="ex" id="ex1">2 Squat</button>
      <button class="ex" id="ex2">3 Deadlift</button>
      <button class="ex" id="ex3">4 Shoulder</button>
      <button class="ex" id="ex4">5 Pullups</button>
    </div>

    <button class="back" onclick="openPage('home')">BACK</button>
  </div>
</div>

<!-- CYCLING -->
<div class="page" id="cycling">
  <div class="card">
    <h2>🚴 CYCLING MODE</h2>

    <div class="cyclingBox" id="cyclingUI">
      READY
    </div>

    <button onclick="startCycling()">START CYCLING</button>
    <button onclick="stopCycling()">STOP</button>

    <button class="back" onclick="openPage('home')">BACK</button>
  </div>
</div>

<!-- MUSIC -->
<div class="page" id="music">
  <div class="card">
    <h2>🎧 MUSIC</h2>
    <button onclick="togglePlay()">PLAY / PAUSE</button>
    <button class="back" onclick="openPage('home')">BACK</button>
  </div>
</div>

<!-- EMERGENCY -->
<div class="page" id="emergency">
  <div class="card">
    <h2>🆘 EMERGENCY</h2>
    <button class="emergency" onclick="window.location.href='tel:+393491972057'">
      CALL
    </button>
  </div>
</div>

<!-- AUDIO -->
<audio id="audio" controls></audio>

<script>

/* NAV */
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* MUSIC GLOBAL */
const audio = document.getElementById("audio");
const playlist = ["https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/beat1.mp3"];

function togglePlay(){
  if(!audio.src) audio.src = playlist[0];
  audio.paused ? audio.play() : audio.pause();
}

/* =========================
   HIIT
========================= */

let hiit=null;
let phase="work";
let time=30;
let ex=0;
let set=1;
let running=false;

function beep(){
  const ctx = new (window.AudioContext||webkitAudioContext)();
  const o = ctx.createOscillator();
  o.connect(ctx.destination);
  o.frequency.value=800;
  o.start();
  setTimeout(()=>o.stop(),150);
}

function updateHIIT(){
  document.getElementById("timer").innerText =
    `E${ex+1} SET ${set} ${phase.toUpperCase()} ${time}`;

  for(let i=0;i<5;i++)
    document.getElementById("ex"+i).classList.remove("active");

  document.getElementById("ex"+ex).classList.add("active");
}

function nextHIIT(){
  if(phase==="work"){
    phase="rest"; time=15;
  } else {
    phase="work"; time=30;
    set++;

    if(set>3){
      set=1;
      ex++;

      if(ex>=5){
        clearInterval(hiit);
        running=false;
        document.getElementById("timer").innerText="DONE";
        return;
      }
    }
  }
}

function startHIIT(){
  if(running) return;
  running=true;

  hiit=setInterval(()=>{
    updateHIIT();
    time--;

    if(time<0){ beep(); nextHIIT(); }
  },1000);
}

function stopHIIT(){
  clearInterval(hiit);
  running=false;
}

/* =========================
   CYCLING
========================= */

let cycle=null;
let cPhase="warmup";
let cTime=120;
let calories=0;

function addCal(){
  if(cPhase==="warmup") calories+=5/60;
  if(cPhase==="recovery") calories+=7/60;
  if(cPhase==="sprint") calories+=12/60;
}

function nextCycle(){
  if(cPhase==="warmup"){ cPhase="sprint"; cTime=30; }
  else if(cPhase==="sprint"){ cPhase="recovery"; cTime=60; }
  else { cPhase="sprint"; cTime=30; }
}

function updateCycle(){
  document.getElementById("cyclingUI").innerText =
    `${cPhase.toUpperCase()} | ${cTime}s | ${calories.toFixed(1)} kcal`;
}

function startCycling(){
  clearInterval(cycle);

  cycle=setInterval(()=>{
    updateCycle();
    addCal();
    cTime--;

    if(cTime<0){
      beep();
      nextCycle();
    }
  },1000);
}

function stopCycling(){
  clearInterval(cycle);
}

</script>

</body>
</html>
