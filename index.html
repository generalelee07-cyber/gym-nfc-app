<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM NFC PRO</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0f1f, #111827);
  color: white;
  padding-top: 65px;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111827;
  padding: 10px 0;
  border-bottom: 1px solid #333;
  z-index: 10;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 11px;
  font-weight: bold;
}

/* PAGES */
.page {
  display: none;
  padding: 20px;
  text-align: center;
}

.active { display: block; }

/* CARD UI */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.emergency {
  background: #dc2626 !important;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111827;
  padding: 10px;
  border-top: 1px solid #333;
}

audio { width: 100%; }

.song-title {
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="openPage('home')">HOME</button>
  <button onclick="openPage('workout')">WORKOUT</button>
  <button onclick="openPage('music')">MUSIC</button>
  <button onclick="openPage('emergency')">EMERGENCY</button>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">
    <h1>🏋️ GYM HUB PRO</h1>

    <button onclick="openPage('workout')">💪 START WORKOUT</button>
    <button onclick="openPage('music')">🎧 MUSIC</button>
    <button onclick="openPage('emergency')" class="emergency">🆘 EMERGENCY</button>
  </div>
</div>

<!-- WORKOUT -->
<div class="page" id="workout">
  <div class="card">
    <h2>💪 WORKOUT MODE</h2>

    <button onclick="setWorkout('power')">🔥 POWER</button>
    <button onclick="setWorkout('cardio')">🏃 CARDIO</button>
    <button onclick="setWorkout('recovery')">🧘 RECOVERY</button>
  </div>
</div>

<!-- MUSIC -->
<div class="page" id="music">
  <div class="card">
    <h2>🎧 MUSIC PLAYER</h2>

    <button onclick="togglePlay()">⏯ PLAY / PAUSE</button>
    <button onclick="nextTrack()">⏭ NEXT</button>
    <button onclick="toggleLoop()">🔁 LOOP ON/OFF</button>
  </div>
</div>

<!-- EMERGENCY -->
<div class="page" id="emergency">
  <div class="card">
    <h2>🆘 EMERGENCY</h2>

    <p><b>ICE 1:</b> +39 349 1972057</p>
    <p><b>ICE 2:</b> +39 347 9876543</p>

    <button class="emergency" onclick="callICE1()">📞 CALL ICE 1</button>
    <button class="emergency" onclick="callICE2()">📞 CALL ICE 2</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="song-title" id="songTitle">Nessuna musica</div>
  <audio id="audio" controls></audio>
</div>

<script>

/* NAV */
function openPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  console.log("NFC READY →", id);
}

/* 📞 EMERGENCY */
function callICE1(){
  window.location.href = "tel:+393491972057";
}

function callICE2(){
  window.location.href = "tel:+393479876543";
}

/* 🎧 AUDIO */
const audio = document.getElementById("audio");
const title = document.getElementById("songTitle");

/* PLAYLIST */
const playlists = {
  power: [
    { name:"Power Beat", url:"https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/beat1.mp3" }
  ],
  cardio: [
    { name:"Cardio Run", url:"https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/motivation2.mp3" }
  ],
  recovery: [
    { name:"Relax Guitar", url:"https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/acoustic_guitar.mp3" }
  ]
};

let currentPlaylist = [];
let current = 0;
let loopEnabled = true;

/* WORKOUT SELECT */
function setWorkout(type){
  currentPlaylist = playlists[type];
  current = 0;
  openPage("music");
  loadTrack();
}

/* LOAD TRACK */
function loadTrack(){
  const t = currentPlaylist[current];
  audio.src = t.url;
  title.innerText = "🎧 " + t.name;
  audio.play().catch(()=>{});
}

/* PLAY/PAUSE */
function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* NEXT */
function nextTrack(){
  current = (current + 1) % currentPlaylist.length;
  loadTrack();
}

/* LOOP */
function toggleLoop(){
  loopEnabled = !loopEnabled;
}

/* AUTO NEXT */
audio.addEventListener("ended", ()=>{
  if(loopEnabled){
    nextTrack();
  } else {
    audio.pause();
  }
});

</script>

</body>
</html>
