<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYM NFC APP</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1f, #111827);
      color: white;
      padding-bottom: 120px; /* spazio per player */
    }

    .page {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .active {
      display: block;
    }

    /* NAV BAR SEMPRE VISIBILE */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #111827;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    /* PLAYER */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111827;
      padding: 10px;
      border-top: 1px solid #333;
      text-align: center;
    }

    audio { width: 100%; }

    .song-title {
      font-size: 14px;
      margin-bottom: 5px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<!-- NAV SEMPRE VISIBILE -->
<div class="nav">
  <button onclick="openPage('home')">HOME</button>
  <button onclick="openPage('music')">MUSIC</button>
  <button onclick="openPage('workout')">WORKOUT</button>
  <button onclick="openPage('progress')">PROGRESS</button>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <h2>🏋️ HOME</h2>
</div>

<!-- MUSIC -->
<div class="page" id="music">
  <h2>🎧 MUSIC</h2>

  <button onclick="playMusic()">▶️ PLAY</button>
  <button onclick="togglePlay()">⏯ PLAY/PAUSE</button>
  <button onclick="nextTrack()">⏭ NEXT</button>
  <button onclick="toggleLoop()">🔁 LOOP</button>
</div>

<!-- WORKOUT -->
<div class="page" id="workout">
  <h2>💪 WORKOUT</h2>
</div>

<!-- PROGRESS -->
<div class="page" id="progress">
  <h2>📈 PROGRESS</h2>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="song-title" id="songTitle">Nessuna musica</div>
  <audio id="audio" controls></audio>
</div>

<script>

// NAVIGAZIONE FIXATA
function openPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// AUDIO
const audio = document.getElementById("audio");
const title = document.getElementById("songTitle");

const tracks = [
  {
    name: "Acoustic Guitar",
    url: "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/acoustic_guitar.mp3"
  },
  {
    name: "Beat Energy",
    url: "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/beat1.mp3"
  }
];

let current = 0;
let loopEnabled = true;

function loadTrack(i) {
  current = i;
  audio.src = tracks[current].url;
  title.innerText = "🎧 " + tracks[current].name;
  audio.load();
  audio.play().catch(()=>{});
}

function playMusic() {
  loadTrack(current);
}

function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function nextTrack() {
  loadTrack((current + 1) % tracks.length);
}

function toggleLoop() {
  loopEnabled = !loopEnabled;
}

audio.addEventListener("ended", () => {
  if (loopEnabled) {
    audio.currentTime = 0;
    audio.play();
  } else {
    nextTrack();
  }
});

</script>

</body>
</html>
