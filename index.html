<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYM NFC APP</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1f, #111827);
      color: white;
    }

    .app {
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.97);
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    /* PLAYER FISSO */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111827;
      padding: 10px;
      text-align: center;
      border-top: 1px solid #333;
    }

    audio {
      width: 100%;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div class="app page active" id="home">
  <h1>🏋️ GYM HUB</h1>

  <button onclick="openPage('music')">▶️ MUSIC</button>
  <button onclick="openPage('workout')">💪 WORKOUT</button>
  <button onclick="openPage('progress')">📈 PROGRESS</button>
  <button onclick="openPage('emergency')">🆘 EMERGENCY</button>
</div>

<!-- MUSIC -->
<div class="page" id="music">
  <h2>🎵 MUSIC</h2>

  <button onclick="playMusic()">▶️ PLAY</button>
  <button onclick="nextTrack()">⏭ NEXT</button>
  <button onclick="shuffleTrack()">🔀 SHUFFLE</button>
</div>

<!-- WORKOUT -->
<div class="page" id="workout">
  <h2>💪 WORKOUT</h2>
  <p>Chest / Back / Legs</p>
</div>

<!-- PROGRESS -->
<div class="page" id="progress">
  <h2>📈 PROGRESS</h2>
</div>

<!-- EMERGENCY -->
<div class="page" id="emergency">
  <h2>🆘 EMERGENCY</h2>
</div>

<!-- PLAYER SEMPRE ATTIVO -->
<div class="player">
  <audio id="audio" controls></audio>
</div>

<script>

// NAVIGAZIONE (NON TOCCA AUDIO)
function openPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// AUDIO SYSTEM
const audio = document.getElementById("audio");

const tracks = [
  "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/acoustic_guitar.mp3",
  "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/beat1.mp3",
  "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/motivation2.mp3"
];

let current = 0;

// PLAY
function playMusic() {
  audio.src = tracks[current];
  audio.load();
  audio.play().catch(err => console.log(err));
}

// NEXT
function nextTrack() {
  current = (current + 1) % tracks.length;
  playMusic();
}

// SHUFFLE
function shuffleTrack() {
  current = Math.floor(Math.random() * tracks.length);
  playMusic();
}

</script>

</body>
</html>
