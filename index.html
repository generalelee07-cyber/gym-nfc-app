<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM HUB SPOTIFY MODE</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0f1f, #111827);
  color: white;
  padding-top: 65px;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111827;
  padding: 10px 0;
  border-bottom: 1px solid #333;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 11px;
  font-weight: bold;
}

/* PAGES */
.page {
  display: none;
  padding: 20px;
  text-align: center;
}

.active { display: block; }

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-top: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.emergency { background: #dc2626 !important; }
.back { background: #374151 !important; }

/* TIMER */
.timer {
  font-size: 34px;
  font-weight: bold;
  margin: 10px 0;
}

/* EX */
.exercise-box {
  margin-top: 15px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.ex {
  background: #1f2937 !important;
}

.ex.active {
  background: #22c55e !important;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111827;
  padding: 10px;
  border-top: 1px solid #333;
}

audio { width: 100%; }
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="openPage('home')">HOME</button>
  <button onclick="openPage('workout')">WORKOUT</button>
  <button onclick="openPage('music')">MUSIC</button>
  <button onclick="openPage('emergency')">EMERGENCY</button>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">
    <h1>🏋️ GYM HUB</h1>

    <button onclick="openPage('workout')">💪 START</button>
    <button onclick="openPage('music')">🎧 MUSIC</button>
    <button class="emergency" onclick="openPage('emergency')">🆘 EMERGENCY</button>
  </div>
</div>

<!-- WORKOUT -->
<div class="page" id="workout">
  <div class="card">
    <h2>💪 WORKOUT MODE</h2>

    <button onclick="openPage('powerPage')">🔥 POWER HIIT</button>

    <button class="back" onclick="openPage('home')">⬅️ BACK</button>
  </div>
</div>

<!-- POWER -->
<div class="page" id="powerPage">
  <div class="card">
    <h2>🔥 POWER HIIT</h2>

    <div class="timer" id="timer">READY</div>

    <button onclick="startHIIT()">▶️ START</button>
    <button onclick="stopHIIT()">⏹ STOP</button>

    <div class="exercise-box">
      <h3>💪 EXERCISES</h3>

      <button class="ex">1 - Bench Press</button>
      <button class="ex">2 - Squat</button>
      <button class="ex">3 - Deadlift</button>
      <button class="ex">4 - Shoulder Press</button>
      <button class="ex">5 - Pull Ups</button>
    </div>

    <button class="back" onclick="openPage('workout')">⬅️ BACK</button>
  </div>
</div>

<!-- MUSIC -->
<div class="page" id="music">
  <div class="card">
    <h2>🎧 MUSIC</h2>

    <button onclick="togglePlay()">▶️ PLAY / PAUSE</button>

    <button class="back" onclick="openPage('home')">⬅️ BACK</button>
  </div>
</div>

<!-- EMERGENCY -->
<div class="page" id="emergency">
  <div class="card">
    <h2>🆘 EMERGENCY</h2>

    <button class="emergency" onclick="window.location.href='tel:+393491972057'">
      📞 CALL
    </button>

    <button class="back" onclick="openPage('home')">⬅️ BACK</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="audio" controls></audio>

<script>

/* NAV */
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUDIO GLOBAL */
const audio = document.getElementById("audio");

const playlist = [
  "https://raw.githubusercontent.com/generalelee07-cyber/gym-nfc-app/main/beat1.mp3"
];

let index = 0;

function load(){
  audio.src = playlist[index];
}

function togglePlay(){
  if(!audio.src) load();

  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

/* HIIT */
let hiit;
let phase = "work";
let time = 30;

let exerciseIndex = 0;
let setCount = 1;

function beep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.frequency.value = 800;
  osc.start();
  setTimeout(()=>osc.stop(),150);
}

function updateUI(){
  document.getElementById("timer").innerText =
    `E${exerciseIndex+1} - SET ${setCount} - ${phase.toUpperCase()} ${time}`;
}

function nextStep(){
  if(phase === "work"){
    phase = "rest";
    time = 15;
  } else {
    phase = "work";
    time = 30;

    setCount++;

    if(setCount > 3){
      setCount = 1;
      exerciseIndex++;

      if(exerciseIndex >= 5){
        clearInterval(hiit);
        document.getElementById("timer").innerText = "DONE";
        return;
      }
    }
  }
}

function startHIIT(){
  clearInterval(hiit);

  exerciseIndex = 0;
  setCount = 1;
  phase = "work";
  time = 30;

  hiit = setInterval(()=>{
    updateUI();
    time--;

    if(time < 0){
      beep();
      nextStep();
    }
  },1000);
}

function stopHIIT(){
  clearInterval(hiit);
  document.getElementById("timer").innerText = "STOP";
}

</script>

</body>
</html>
